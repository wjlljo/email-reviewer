<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>ChatGPT Email Reviewer</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; text-align: center; }
        button { padding: 12px 20px; background-color: #10a37f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background-color: #0d8a6a; }
        #status { margin-top: 15px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
    <h2>ChatGPT Reviewer</h2>
    <p>Click below to polish your email draft's grammar, tone, and clarity.</p>
    <button id="reviewBtn">Review & Replace Text</button>
    <p id="status"></p>

    <script>
        // Initialize the Office Add-in
        Office.onReady(function (info) {
            if (info.host === Office.HostType.Outlook) {
                document.getElementById("reviewBtn").onclick = reviewAndReplaceEmail;
            }
        });

        function reviewAndReplaceEmail() {
            const statusEl = document.getElementById("status");
            statusEl.innerText = "Reading your draft...";

            // 1. Get the current email text
            Office.context.mailbox.item.body.getAsync(Office.CoercionType.Text, async function (asyncResult) {
                if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
                    const originalText = asyncResult.value;
                    statusEl.innerText = "Asking ChatGPT to review...";

                    try {
                        // 2. Send to OpenAI
                        const reviewedText = await fetchChatGPTReview(originalText);

                        statusEl.innerText = "Replacing text...";
                        
                        // 3. Write the new text back to the email
                        Office.context.mailbox.item.body.setAsync(
                            reviewedText,
                            { coercionType: Office.CoercionType.Text },
                            function (setResult) {
                                if (setResult.status === Office.AsyncResultStatus.Failed) {
                                    statusEl.innerText = "Error replacing text: " + setResult.error.message;
                                } else {
                                    statusEl.innerText = "Done! Your email is updated.";
                                }
                            }
                        );
                    } catch (error) {
                        statusEl.innerText = "Error connecting to ChatGPT. Check console.";
                        console.error(error);
                    }
                } else {
                    statusEl.innerText = "Error reading email: " + asyncResult.error.message;
                }
            });
        }

        async function fetchChatGPTReview(text) {
            // SECURE THIS BEFORE PUBLISHING!
            const apiKey = "YOUR_OPENAI_API_KEY"; 
            
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo", // You can change this to gpt-4 if you have access
                    messages: [
                        { 
                            role: "system", 
                            content: "You are a professional email editor. Improve the grammar, tone, and clarity of the following text. Reply ONLY with the rewritten text, with no introductory or concluding remarks." 
                        },
                        { role: "user", content: text }
                    ]
                })
            });

            if (!response.ok) {
                throw new Error("OpenAI API error");
            }

            const data = await response.json();
            return data.choices[0].message.content.trim();
        }
    </script>
</body>
</html>
